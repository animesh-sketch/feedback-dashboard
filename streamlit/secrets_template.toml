# Copy this file to .streamlit/secrets.toml (one level up, at the repo root)
# and fill in your real values. Never commit secrets.toml to git.
#
# Google Cloud Console setup:
#   1. console.cloud.google.com → New Project → Enable Gmail API
#   2. OAuth consent screen → External
#      Add scopes: gmail.send, userinfo.email
#   3. Credentials → OAuth 2.0 Client ID → Web Application
#      Authorized redirect URIs: http://localhost:8501 (dev)
#                                 https://your-app.streamlit.app (prod)
#   4. Copy Client ID + Secret below

GOOGLE_CLIENT_ID     = "your-client-id-here.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "your-client-secret-here"
REDIRECT_URI         = "http://localhost:8501"
