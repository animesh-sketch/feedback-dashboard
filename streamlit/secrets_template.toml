# Copy this file to .streamlit/secrets.toml and fill in real values.
# Never commit secrets.toml to git.

# ── Login credentials ─────────────────────────────────────────────────────────
# Only this email will be allowed to log in.
# Generate a password hash:
#   python3 -c "import hashlib; print(hashlib.sha256(b'yourpassword').hexdigest())"

USER_EMAIL = "you@example.com"
USER_HASH  = "<sha256_hash_of_your_password>"

# ── Supabase (for all database storage) ───────────────────────────────────────
# supabase.com → your project → Settings → API
# Use the Project URL and anon/public key.

SUPABASE_URL = "https://<your-project-ref>.supabase.co"
SUPABASE_KEY = "<your-anon-public-key>"

# ── Gmail SMTP (for sending emails) ───────────────────────────────────────────
# 1. myaccount.google.com → Security → enable 2-Step Verification
# 2. Search "App Passwords" → create one for Mail → copy the 16-char code

GMAIL_SENDER       = "you@gmail.com"
GMAIL_APP_PASSWORD = "abcd efgh ijkl mnop"

# ── Anthropic (for AI features) ───────────────────────────────────────────────

ANTHROPIC_API_KEY = "sk-ant-..."

# ── Brevo / Sendinblue (for email sending via API) ────────────────────────────
# app.brevo.com → SMTP & API → API Keys

RESEND_API_KEY = "<your-brevo-api-key>"
