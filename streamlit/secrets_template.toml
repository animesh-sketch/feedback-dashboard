# Copy this file to .streamlit/secrets.toml and fill in real values.
# Never commit secrets.toml to git.

# ── App users ─────────────────────────────────────────────────────────────────
# Store passwords as SHA-256 hashes.
# Generate one: python3 -c "import hashlib; print(hashlib.sha256(b'yourpassword').hexdigest())"

[users]
"you@example.com" = "<sha256_hash_of_password>"

# ── Gmail SMTP (for sending emails) ───────────────────────────────────────────
# Gmail → Google Account → Security → 2-Step Verification → App passwords
# Create an app password for "Mail", copy the 16-char code below.

GMAIL_SENDER       = "you@gmail.com"
GMAIL_APP_PASSWORD = "xxxx xxxx xxxx xxxx"

# ── Anthropic (for AI features) ───────────────────────────────────────────────

ANTHROPIC_API_KEY = "sk-ant-..."
